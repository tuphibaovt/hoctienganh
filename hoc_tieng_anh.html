    // Premium Exponential Backoff API Wrapper for Gemini Text Generation
    async function fetchGeminiText(prompt, systemPrompt = "", activeKey = "", retries = 5, delay = 1000) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        ...(systemPrompt && { systemInstruction: { parts: [{ text: systemPrompt }] } })
      };
      
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(res => setTimeout(res, delay));
          delay *= 2;
        }
      }
    }

    // Premium Exponential Backoff API Wrapper for Voice Synthesis
    async function fetchGeminiTTS(text, voice = "Kore", activeKey = "", retries = 5, delay = 1000) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${activeKey}`;
      const payload = {
        contents: [{ parts: [{ text: `Say naturally: ${text}` }] }],
        generationConfig: {
          responseModalities: ["AUDIO"],
          speechConfig: {
            voiceConfig: {
              prebuiltVoiceConfig: { voiceName: voice }
            }
          }
        },
        model: "gemini-2.5-flash-preview-tts"
      };

      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.inlineData || null;
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(res => setTimeout(res, delay));
          delay *= 2;
        }
      }
    }

    // Convert raw API PCM block stream into standard WAV blob
    function pcmToWav(pcmBase64, sampleRate = 24000) {
      try {
        const binaryString = atob(pcmBase64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        const buffer = bytes.buffer;
        const wavHeader = new ArrayBuffer(44);
        const view = new DataView(wavHeader);
        
        const writeString = (v, offset, string) => {
          for (let i = 0; i < string.length; i++) {
            v.setUint8(offset + i, string.charCodeAt(i));
          }
        };

        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + buffer.byteLength, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // Raw Integer PCM
        view.setUint16(22, 1, true); // Mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(view, 36, 'data');
        view.setUint32(40, buffer.byteLength, true);
        
        const wavBlob = new Blob([wavHeader, buffer], { type: 'audio/wav' });
        return URL.createObjectURL(wavBlob);
      } catch (e) {
        console.error("PCM transformation to WAV failed", e);
        return null;
      }
    }

      });

      const [isGeneratingAILesson, setIsGeneratingAILesson] = useState(false);
      const [dailyTasks, setDailyTasks] = useState(PRELOADED_LESSONS[4].tasks);

      // Resolve the active API key (User custom key has priority, falls back to runtime empty string placeholder)
      const getActiveKey = () => {
        return customApiKey.trim() || defaultApiKey;
      };

      // Custom notification trigger
      const triggerToast = (message, type = "success") => {
        setShowToast({ message, type });
        setTimeout(() => setShowToast(null), 3500);
      };

      // Connection tester for Custom API Key
      const handleTestKeyConnection = async () => {
        if (!customApiKey.trim()) {
          triggerToast("Vui lòng nhập API Key trước khi kiểm tra!", "error");
          return;
        }
        setTestLoading(true);
        try {
          const testResponse = await fetchGeminiText("Respond only with the word: CONNECTED.", "You are a test agent.", customApiKey.trim(), 2, 500);
          if (testResponse && testResponse.toUpperCase().includes("CONNECTED")) {
            triggerToast("Kết nối thành công! Khóa API của bạn hoạt động hoàn hảo.", "success");
          } else {
            triggerToast("Nhận phản hồi lạ từ API. Vui lòng xác minh lại mã khóa.", "error");
          }
        } catch (err) {
          console.error(err);
          triggerToast("Kết nối thất bại. Vui lòng kiểm tra lại tính chính xác của API Key.", "error");
        } finally {
          setTestLoading(false);
        }
      };

      // Play audio via Gemini API
      const speakText = async (text) => {
        if (!text) return;
        setAudioLoading(true);
        try {
          const inlineData = await fetchGeminiTTS(text, ttsVoice, getActiveKey());
          if (inlineData && inlineData.data) {
            const rate = inlineData.mimeType?.includes("rate=")

              {showToast.type !== 'error' && (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 text-emerald-400 shrink-0">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
                </svg>
              )}
              <span class="text-xs font-bold leading-tight">{showToast.message}</span>
            </div>
          )}

        </div>
      );
    }

    // Mounting Phase
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
